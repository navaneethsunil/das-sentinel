# Pre-commit hooks (M0-SEC1). Install once per clone:
#   uvx pre-commit install
# Gitleaks blocks a commit that would introduce a secret — the local half of the
# day-one secrets gate (SECURITY_DEVELOPMENT_PLAN §5: CI scans full history,
# this hook stops the leak before it ever becomes history).
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
