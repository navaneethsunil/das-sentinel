[project]
name = "das-sentinel-api"
version = "0.1.0"
description = "DAS Sentinel API/worker (FastAPI + Celery)"
requires-python = ">=3.12"
# Grown in lockstep with milestones (M0-I3 config, M0-B1 API skeleton).
# Celery lands in M0-W1, Alembic in M0-D1.
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "redis>=5.0",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.5",
    "httpx>=0.27",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # pytest asserts

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
