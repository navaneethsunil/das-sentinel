[project]
name = "das-sentinel-api"
version = "0.1.0"
description = "DAS Sentinel API/worker (FastAPI + Celery)"
requires-python = ">=3.12"
# M0-I3: config layer only. FastAPI/uvicorn land in M0-B1, Celery in M0-W1,
# SQLAlchemy/Alembic in M0-D1 — keep this list in lockstep with the milestones.
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.4",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.5",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # pytest asserts

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
