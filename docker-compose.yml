# DAS Sentinel — local/self-hosted stack (single node, air-gap friendly).
#
# Topology from M0-I2. api (M0-B1) and web (M0-F1) are live; worker runs the api image
# with a stub command until M0-W1. Requires `.env` (copy from `.env.example`).
#
# Invariants enforced here (CLAUDE.md §3, ARCHITECTURE.md, TRD §2):
#   - only `proxy` publishes a host port (:443); all other traffic is on the internal network (TR-4)
#   - `--init` (init: true) on `worker` for zombie reaping / signal forwarding (§6a, TM-12)
#   - deploy.resources.limits on every service (a runaway scan must not starve the DB) (TM-12)
#   - healthchecks + depends_on: service_healthy so dependents wait for their backing services
#   - image tags pinned now; digest-pin (…@sha256:) is a follow-up per TR-25
#
# NOTE (evidence backend): MinIO OSS repo was archived 2026-04-25 — this is a DEV-ONLY store behind
# the future storage/ abstraction. The production WORM backend is a tracked gate (ROADMAP.md).

name: das-sentinel

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dassentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-dassentinel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  valkey:
    image: valkey/valkey:8
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  minio:
    # TODO(TR-25 / ROADMAP evidence-backend gate): pin to the last-good OSS release by digest.
    image: minio/minio:${MINIO_IMAGE_TAG:-latest}
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dassentinel}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-devpassword}
    volumes:
      - minio-data:/data
    healthcheck:
      # Recent MinIO images may not ship curl; if this reports unhealthy, swap to an mc-based
      # readiness check (dev-only — tracked with the evidence-backend gate).
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runtime   # lean base image; never the monitoring/redteam stages
    # One-shot (M0-D1): applies Alembic migrations and exits 0; api and worker
    # gate on service_completed_successfully so they never see a stale schema.
    # DB-readiness gate = postgres healthcheck (pg_isready) via depends_on.
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runtime   # lean base image; never the monitoring/redteam stages
    # Runtime config comes exclusively from .env (copy .env.example → .env);
    # secrets never bake into the image (TR-23).
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Liveness only (/healthz): a DB/Valkey outage must not restart-loop the API.
      # Readiness (/readyz) is asserted by the smoke test (M0-T1).
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runtime   # lean base image; never the monitoring/redteam stages
    # Same image as api with the CMD overridden (M0-W1). Concurrency stays modest:
    # scanner tasks are long-running subprocesses, not CPU-bound Python (§6a).
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker",
              "--loglevel=INFO", "--concurrency=2"]
    env_file: .env
    init: true            # tini: reap re-parented scanner children, forward signals (§6a)
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Liveness via the broker: the worker answers a ping addressed to itself.
      test: ["CMD-SHELL", "celery -A app.workers.celery_app:celery_app inspect ping -d celery@$$(hostname) --timeout 10 | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redteam-worker:
    # M2-B3: the PyRIT-backed worker. Built from the `redteam` image target, which
    # adds the hash-pinned PyRIT bundle on top of the runtime image. Kept behind the
    # `redteam` profile so it is NOT part of the default stack, the CI `images`
    # build (`--profile dev build`), or the Trivy image scan (api/web only) — its
    # 107-package ML footprint stays isolated from the base gates. Bring it up for
    # AI/LLM suites: `docker compose --profile redteam up -d redteam-worker`.
    # Task routing of PyRIT suites onto this worker lands with M2-B4/B6.
    profiles: ["redteam"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: redteam
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker",
              "--loglevel=INFO", "--concurrency=2", "--hostname=redteam@%h"]
    env_file: .env
    init: true            # reap re-parented children, forward signals (§6a)
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  flower:
    # DEV ONLY (M0-W1): Celery monitoring UI. flower==2.0.1 (last release, 2023-08)
    # pinned in the image's `monitoring` group so it runs the same Celery as the
    # worker. Not part of the default stack: `docker compose --profile dev up -d flower`.
    # Publishing 127.0.0.1:5555 is a deliberate dev-only exception to the
    # single-ingress rule (TR-4) — loopback-bound, never 0.0.0.0, no prod profile.
    profiles: ["dev"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: monitoring
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "flower",
              "--address=0.0.0.0", "--port=5555"]
    env_file: .env
    ports:
      - "127.0.0.1:5555:5555"
    # Waits for the worker: Flower populates its worker-inspect cache at boot, so
    # starting before the worker leaves the /worker detail views empty.
    depends_on:
      valkey:
        condition: service_healthy
      worker:
        condition: service_healthy
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    # Least privilege: web gets ONLY what it needs — no env_file (DB/MinIO/LLM
    # secrets stay out of the frontend container).
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # node:24-slim ships no curl/wget; global fetch is built in.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  proxy:
    image: caddy:2
    # The ONLY service that publishes a host port (single ingress — TR-4).
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      # Caddy's admin API is on localhost:2019; the alpine image ships busybox wget.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:2019/config/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  minio-data:
  caddy-data:
  caddy-config:
